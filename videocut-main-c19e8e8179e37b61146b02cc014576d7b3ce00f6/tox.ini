[tox]
# 定义要测试的Python环境（可指定版本或别名）
envlist = py39, py310, py311, lint

# [可选] 跳过源码打包（适用于本地开发）
skipsdist = true

# 定义各环境的配置
[testenv]
# 依赖安装（从requirements文件或直接指定）
deps =
    pytest>=7.0
    pytest-cov>=4.0
    -rrequirements.txt  # 引入项目依赖

# 环境变量
setenv =
    PYTHONPATH = {toxinidir}/src  # 设置项目路径
    TEST_DATA = {toxinidir}/tests/data  # 测试数据路径

# 要执行的命令（按顺序执行）
commands =
    pytest --cov=src tests/  # 运行测试并生成覆盖率报告

# [可选] 仅针对lint环境的配置（代码检查）
[testenv:lint]
# 覆盖全局deps，仅安装代码检查工具
deps =
    flake8>=6.0
    black>=23.0
    isort>=5.0

# 执行代码检查命令
commands =
    flake8 src/ tests/  # 检查代码风格
    black --check src/ tests/  # 检查代码格式（不自动修复）
    isort --check-only src/ tests/  # 检查导入顺序
