[pytest]
testpaths = web_tests 
            domains_tests
pythonpath = web
            domains
addopts = --cov=src --cov-report=term-missing --cov-report=html
norecursedirs = .git .venv dist build *.egg-info
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: 单元测试
    integration: 集成测试
    smoke: 冒烟测试(核心功能测试)
    performance: 性能测试
    slow: 耗时较长的测试