
services:
  app:
    # 构建镜像（基于当前目录的Dockerfile）
    build: .
    # 容器名称
    container_name: video_flask_app
    # 端口映射（宿主机端口:容器端口）
    ports:
      - "8000:8000"
    dns:
      - 114.114.114.114  # 国内 114DNS
    # 卷绑定配置
    volumes:
      # 方式1：绑定到宿主机目录（适合开发环境，可直接修改文件）
      # - ./docker_data/.logs:/app/.logs
      # - ./docker_data/.work_space:/app/.work_space
      # - ./docker_data/.asset_space:/app/.asset_space

      
      # 方式2：使用命名卷（适合生产环境，由Docker管理存储）
      - app_logs:/app/.logs
      - app_workspace:/app/.work_space
      - app_assetspace:/app/.asset_space

      
    # 重启策略（可选，生产环境推荐）
    restart: unless-stopped
    # 环境变量（可选，根据需要添加）
    environment:
      - TZ=Asia/Shanghai  # 设置时区
      - FLASK_ENV=production  # Flask运行环境

# 命名卷定义（仅当使用方式2时需要）
volumes:
  app_cache:
  app_logs:
  app_workspace:
  app_assetspace:
